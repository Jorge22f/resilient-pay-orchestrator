name: Resilient Pay Orchestrator CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest

    # Spin up identical data dependencies in the background
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: test_secure_password
          POSTGRES_DB: payment_orchestrator_test
        ports:
          - 5432:5432
        # Ensure postgres is completely ready before the tests start running
        options: >-
          --health-cmd "pg_isready -U admin -d payment_orchestrator_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Code Formatting (Prettier)
        run: npm run format:check || echo "Run 'npm run format' locally to fix"

      - name: Run Linter (ESLint)
        run: npm run lint

      - name: Run Database Migrations
        run: npx knex migrate:latest
        env:
          DB_HOST: localhost
          DB_USER: admin
          DB_PASSWORD: test_secure_password
          DB_NAME: payment_orchestrator_test

      - name: Execute Test Suite
        run: npm test
        env:
          NODE_ENV: test
          DB_HOST: localhost
          REDIS_HOST: localhost